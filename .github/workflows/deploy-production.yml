name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,GIT_BRANCH,BACKEND_SERVICE,NGINX_SITE_CONF,FRONTEND_WEB_ROOT,HEALTHCHECK_URL
          script: |
            export DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/root/iris2' }}"
            export GIT_BRANCH="${{ vars.GIT_BRANCH || 'main' }}"
            export BACKEND_SERVICE="${{ vars.BACKEND_SERVICE || 'iris-backend' }}"
            export NGINX_SITE_CONF="${{ vars.NGINX_SITE_CONF || '/etc/nginx/sites-enabled/default' }}"
            export FRONTEND_WEB_ROOT="${{ vars.FRONTEND_WEB_ROOT }}"
            export HEALTHCHECK_URL="${{ vars.HEALTHCHECK_URL }}"
            export DEPLOY_FROM_GIT="1"
            bash "$DEPLOY_PATH/scripts/deploy_server.sh"
