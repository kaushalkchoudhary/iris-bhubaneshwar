# IRIS2 client hardened nginx config (production)
# Place in /etc/nginx/sites-available/iris-client-secure.conf and symlink to sites-enabled.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Basic request-rate protection for API and auth routes
limit_req_zone $binary_remote_addr zone=api_rate:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=5r/s;

upstream iris_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge support
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    root /var/www/iris2/frontend/dist;
    index index.html;
    autoindex off;
    server_tokens off;
    client_max_body_size 10m;

    # If you want to disable HEAD entirely (some scanners flag it), explicitly reject it.
    # Note: disabling HEAD is not generally required for security and can break monitoring/CDNs.
    if ($request_method = HEAD) { return 405; }

    # TLS hardening
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Mandatory security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; script-src 'self' https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://maps.googleapis.com https://maps.gstatic.com https://*.googleapis.com https://*.gstatic.com https://i.pravatar.cc; connect-src 'self' https://iris.wiredleap.com https://www.wasenderapi.com https://maps.googleapis.com ws: wss:;" always;

    # Prevent information leakage
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }
    location ~* \.(?:env|git|gitignore|bak|old|orig|swp|sql|ini|log|conf)$ {
        deny all;
        return 404;
    }
    location ~* \.(?:ts|tsx)$ {
        deny all;
        return 404;
    }
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy + rate limiting
    location /api/ {
        limit_req zone=api_rate burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://iris_backend;
    }

    # WebSocket proxy for feed streams
    location /ws/ {
        limit_req zone=auth_rate burst=15 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://iris_backend;
    }

    access_log /var/log/nginx/iris-client.access.log;
    error_log /var/log/nginx/iris-client.error.log warn;
}
