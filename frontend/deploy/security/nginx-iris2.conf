server {
    listen 80;
    listen [::]:80;
    server_name iris2.example.gov.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iris2.example.gov.in;

    root /var/www/iris2/frontend/dist;
    index index.html;

    # If you want to disable HEAD entirely (some scanners flag it), explicitly reject it.
    # Note: disabling HEAD is not generally required for security and can break monitoring/CDNs.
    if ($request_method = HEAD) { return 405; }

    ssl_certificate /etc/letsencrypt/live/iris2.example.gov.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iris2.example.gov.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    include snippets/iris-security-headers.conf;
    include snippets/iris-hardening.conf;

    access_log /var/log/nginx/iris-access.log;
    error_log /var/log/nginx/iris-error.log warn;

    location /api/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 40;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /heatmaps/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /wasender/ {
        limit_req zone=api_per_ip burst=10 nodelay;
        proxy_pass https://www.wasenderapi.com/;
        proxy_http_version 1.1;
        proxy_set_header Host www.wasenderapi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
